name: Build and Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar-path: ${{ steps.build.outputs.jar-path }}
      new-tag: ${{ steps.version.outputs.new-tag }}
      new-version: ${{ steps.version.outputs.new-version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      id: build
      run: |
        mvn clean package -DskipTests
        echo "jar-path=target/Fulldev-coins-1.0-SNAPSHOT.jar" >> $GITHUB_OUTPUT
        echo "✅ Build concluído com sucesso"

    - name: Calculate version
      id: version
      run: |
        # Obter última tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "📌 Última tag: $LATEST_TAG"
        
        # Extrair versão
        VERSION=$(echo $LATEST_TAG | sed 's/v//')
        MAJOR=$(echo $VERSION | cut -d. -f1)
        MINOR=$(echo $VERSION | cut -d. -f2)
        PATCH=$(echo $VERSION | cut -d. -f3)
        
        # Determinar tipo de versão baseado na branch
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          NEW_MINOR=$((MINOR + 1))
          NEW_PATCH=0
          NEW_VERSION="$MAJOR.$NEW_MINOR.$NEW_PATCH"
        else
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
        fi
        
        NEW_TAG="v$NEW_VERSION"
        echo "new-tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "🔢 Nova versão: $NEW_VERSION"

    - name: Create git tag
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: actions/github-script@v7
      with:
        script: |
          const tag = '${{ steps.version.outputs.new-tag }}';
          try {
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`✅ Tag criada: ${tag}`);
          } catch (error) {
            console.log(`⚠️ Tag já existe: ${tag}`);
          }

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.new-tag }}
        name: FulldevCoins ${{ steps.version.outputs.new-version }}
        body: |
          # 🎉 FulldevCoins v${{ steps.version.outputs.new-version }}

          ## 📦 Informações do Build
          - **Data**: ${{ github.event.head_commit.timestamp }}
          - **Commit**: ${{ github.sha }}
          - **Author**: ${{ github.actor }}
          - **Java**: 21
          - **Maven**: Latest
          - **Spigot API**: 1.20.4+

          ## 🎯 Funcionalidades
          - ✅ Drop de moedas ao matar mobs
          - ✅ Configuração personalizada
          - ✅ Sistema de comandos `/fulldevcoins`
          - ✅ Mensagens customizáveis
          - ✅ Lista de mobs configurável
          - ✅ Sistema de permissões

          ## 📥 Instalação
          1. Baixe o arquivo `Fulldev-coins-1.0-SNAPSHOT.jar` abaixo
          2. Coloque em `plugins/` do seu servidor Spigot
          3. Reinicie o servidor
          4. Configure em `plugins/FulldevCoins/config.yml` (opcional)

          ## 📚 Documentação
          - [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)
          - [Guia de Instalação](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/INSTALACAO.md)
          - [Customização](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CUSTOMIZACAO.md)
          - [FAQ](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/FAQ.md)

          ## 🔧 Requisitos
          - Spigot/Bukkit 1.20.4+
          - Java 21+

          ---
          *Build automático realizado pelo GitHub Actions*
        files: |
          target/Fulldev-coins-1.0-SNAPSHOT.jar
        draft: false
        prerelease: ${{ github.ref == 'refs/heads/develop' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: fulldev-coins-jar
        path: target/Fulldev-coins-1.0-SNAPSHOT.jar
        retention-days: 30

    - name: Build Summary
      if: always()
      run: |
        echo "## 📋 Resumo do Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
        echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Status** | ✅ Sucesso |" >> $GITHUB_STEP_SUMMARY
        echo "| **Versão** | ${{ steps.version.outputs.new-version }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Tag** | ${{ steps.version.outputs.new-tag }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **JAR** | Fulldev-coins-1.0-SNAPSHOT.jar |" >> $GITHUB_STEP_SUMMARY
